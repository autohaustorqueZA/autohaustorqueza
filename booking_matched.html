<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTO-HAUS TORQUE | Book Your Mobile Mechanic Service</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@zxing/library@0.21.1/umd/index.min.js"></script>
<style>
:root{--lime:#A8E000;--lime-d:#7AB800;--black:#0A0A0A;--orange:#A8E000;--orange-l:#C6FF2D;--grey-l:#F2F2F0;--grey-m:#D8D8D5;--grey-d:#888885;--white:#fff;--ff:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;--sh:0 4px 20px rgba(0,0,0,.10);--sh2:0 8px 40px rgba(0,0,0,.18);--r:12px;--r-sm:6px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--fb);font-size:14px;background:var(--grey-l);color:var(--black);min-height:100vh;}
h1,h2,h3,h4,h5,h6{font-family:var(--ff);font-size:14px;font-weight:700;text-decoration:underline;text-underline-offset:4px;letter-spacing:.5px;}
h1{font-size:2.6rem;line-height:1;}
h2{font-size:2rem;line-height:1.1;}
h3{font-size:1.5rem;}
h4{font-size:1.2rem;}
h5{font-size:1rem;}
p{font-family:var(--fb);line-height:1.6;font-size:.92rem;}
input,select,textarea{font-family:var(--fb);font-size:.92rem;}
#app{min-height:100vh;}
/* NAV — matched to main site */
#nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:rgba(0,0,0,.95);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(168,224,0,.14);
}
.nav-top{
  background:linear-gradient(90deg,#007A4D,#002395 40%,#DE3831 80%,#FFB612);
  text-align:center;padding:.3rem 1rem;
  font-family:var(--ff);font-size:1rem;font-weight:700;
  letter-spacing:.12em;color:#fff;
}
.nav-inner{
  max-width:1400px;margin:0 auto;padding:0 1.5rem;
  display:flex;align-items:center;gap:1.25rem;height:70px;
}
.nav-brand{display:flex;align-items:center;gap:.75rem;text-decoration:none;flex-shrink:0;}
.nav-brand img.co-logo{height:46px;width:auto;object-fit:contain;}
.nav-brand-text{display:flex;flex-direction:column;line-height:1.1;}
.nav-brand-name{
  font-family:var(--ff);font-size:1rem;font-weight:900;
  letter-spacing:.08em;color:#fff;text-decoration:none;
}
.nav-brand-tag{font-family:var(--ff);font-size:.82rem;color:var(--lime);letter-spacing:.18em;text-transform:uppercase;}
.nav-sa-wrap{
  display:flex;align-items:center;gap:.65rem;
  padding-left:.85rem;border-left:1px solid rgba(168,224,0,.22);flex-shrink:0;
}
.nav-sa-wrap img{height:44px;width:auto;object-fit:contain;}
.nav-sa-label{
  font-family:var(--ff);font-size:.88rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--lime);line-height:1.3;
  display:flex;flex-direction:column;
}
.nav-sa-label span{color:#D0D0D0;font-weight:400;}
.nav-links{display:flex;align-items:center;gap:.15rem;margin:0 auto;list-style:none;}
.nav-links a{
  font-family:var(--ff);font-size:1.08rem;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;color:#D0D0D0;text-decoration:none;
  padding:.4rem .7rem;border-radius:2px;transition:all .2s;
}
.nav-links a:hover{color:var(--lime);background:rgba(168,224,0,.08);}
.nav-right{display:flex;align-items:center;gap:.85rem;flex-shrink:0;}
.nav-phone{
  display:flex;align-items:center;gap:.4rem;
  font-family:var(--ff);font-size:1.06rem;font-weight:700;
  color:#fff;text-decoration:none;letter-spacing:.05em;
}
.nav-phone span{color:var(--lime);}
.nav-admin-btn{
  background:transparent;border:1px solid rgba(255,255,255,.18);color:#fff;
  font-family:var(--ff);font-size:.82rem;font-weight:700;letter-spacing:.08em;
  padding:.6rem 1rem;border-radius:3px;cursor:pointer;text-transform:uppercase;transition:all .2s;
}
.nav-admin-btn:hover{border-color:var(--lime);color:var(--lime);}
#app{padding-top:108px;}
@media(max-width:1100px){
  .nav-links,.nav-sa-wrap{display:none;}
}
@media(max-width:768px){
  .nav-top{font-size:.8rem;letter-spacing:.08em;}
  .nav-inner{padding:0 1rem;gap:.75rem;height:auto;min-height:70px;flex-wrap:wrap;padding-top:.6rem;padding-bottom:.6rem;}
  .nav-right{width:100%;justify-content:flex-end;}
  .nav-phone{font-size:.92rem;}
  #app{padding-top:126px;}
}
/* STEP INDICATOR */
.step-bar{background:var(--black);padding:0 32px 16px;}
.step-track{display:flex;align-items:center;max-width:720px;margin:0 auto;}
.step-dot{width:28px;height:28px;border-radius:50%;background:var(--grey-d);display:flex;align-items:center;justify-content:center;font-family:var(--ff);font-size:.8rem;font-weight:700;color:#fff;flex-shrink:0;transition:all .3s;position:relative;}
.step-dot.active{background:var(--lime);color:var(--black);}
.step-dot.done{background:var(--orange);color:#fff;}
.step-line{flex:1;height:2px;background:var(--grey-d);transition:background .3s;}
.step-line.done{background:var(--orange);}
/* CONTAINER */
.container{max-width:900px;margin:0 auto;padding:32px 24px;}
.container-wide{max-width:1100px;margin:0 auto;padding:32px 24px;}
/* CARDS */
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.card-head{padding:24px 28px;border-bottom:2px solid var(--grey-l);}
.card-body{padding:28px;}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--ff);font-size:1rem;font-weight:700;letter-spacing:.5px;padding:12px 28px;border-radius:var(--r-sm);border:none;cursor:pointer;transition:all .2s;text-decoration:none;}
.btn-primary{background:var(--lime);color:var(--black);}
.btn-primary:hover{background:var(--lime-d);transform:translateY(-1px);box-shadow:var(--sh);}
.btn-orange{background:var(--orange);color:#fff;}
.btn-orange:hover{background:var(--orange-l);transform:translateY(-1px);}
.btn-black{background:var(--black);color:#fff;}
.btn-black:hover{background:#222;}
.btn-outline{background:transparent;border:2px solid var(--black);color:var(--black);}
.btn-outline:hover{background:var(--black);color:#fff;}
.btn-sm{padding:8px 18px;font-size:.88rem;}
.btn-lg{padding:16px 40px;font-size:1.2rem;}
.btn-full{width:100%;justify-content:center;}
.btn-group{display:flex;gap:12px;flex-wrap:wrap;}
/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
label{font-family:var(--ff);font-size:.9rem;font-weight:600;color:var(--black);letter-spacing:.3px;}
input[type=text],input[type=email],input[type=tel],input[type=number],select,textarea{padding:11px 14px;border:2px solid var(--grey-m);border-radius:var(--r-sm);font-size:.92rem;background:#fff;transition:border .2s;width:100%;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--lime);}
.input-note{font-size:.78rem;color:var(--grey-d);}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--ff);font-size:.78rem;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.3px;}
.badge-lime{background:rgba(200,230,52,.2);color:#6a8300;}
.badge-orange{background:rgba(255,107,0,.15);color:var(--orange);}
.badge-grey{background:var(--grey-l);color:var(--grey-d);}
.badge-green{background:#e6f9ee;color:#1a8a42;}
/* HERO */
.hero{background:var(--black);min-height:calc(100vh - 108px);display:flex;align-items:center;position:relative;overflow:hidden;}
.hero-grid{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(200,230,52,.04) 60px,rgba(200,230,52,.04) 61px),repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(200,230,52,.04) 60px,rgba(200,230,52,.04) 61px);}
.hero-accent{position:absolute;right:-100px;top:-100px;width:600px;height:600px;background:radial-gradient(circle,rgba(200,230,52,.12) 0%,transparent 65%);}
.hero-accent2{position:absolute;left:-80px;bottom:-80px;width:400px;height:400px;background:radial-gradient(circle,rgba(255,107,0,.10) 0%,transparent 65%);}
.hero-content{position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:80px 32px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;}
.hero-text{}
.hero-label{font-family:var(--ff);font-size:.88rem;font-weight:700;color:var(--lime);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.hero-label::before{content:'';width:32px;height:2px;background:var(--lime);}
.hero-title{font-family:var(--ff);font-size:3.8rem;font-weight:900;color:#fff;line-height:.95;text-decoration:none;margin-bottom:20px;letter-spacing:.5px;}
.hero-title span{color:var(--lime);}
.hero-sub{color:var(--grey-d);font-size:.95rem;line-height:1.7;margin-bottom:32px;max-width:460px;}
.hero-cta{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.hero-trust{display:flex;align-items:center;gap:6px;color:var(--grey-d);font-size:.82rem;}
.hero-trust span{color:var(--lime);}
.hero-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);padding:32px;backdrop-filter:blur(12px);}
.hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
.stat-box{background:rgba(200,230,52,.08);border:1px solid rgba(200,230,52,.2);border-radius:var(--r-sm);padding:16px;text-align:center;}
.stat-num{font-family:var(--ff);font-size:2rem;font-weight:900;color:var(--lime);}
.stat-lbl{font-size:.78rem;color:var(--grey-d);letter-spacing:.5px;}
.hero-services{display:flex;flex-direction:column;gap:10px;}
.hero-svc-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:rgba(255,255,255,.04);border-radius:var(--r-sm);border:1px solid rgba(255,255,255,.06);}
.hero-svc-icon{font-size:1.4rem;}
.hero-svc-name{font-family:var(--ff);font-weight:600;color:#fff;font-size:.95rem;}
.hero-svc-price{font-family:var(--ff);font-size:.85rem;color:var(--lime);margin-left:auto;}
/* SERVICES OVERVIEW */
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.svc-card{background:#fff;border-radius:var(--r);padding:24px;border:2px solid transparent;transition:all .2s;cursor:pointer;position:relative;overflow:hidden;}
.svc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--lime);}
.svc-card:hover{border-color:var(--lime);transform:translateY(-3px);box-shadow:var(--sh2);}
.svc-icon{font-size:2.4rem;margin-bottom:14px;}
.svc-name{font-family:var(--ff);font-size:1.2rem;font-weight:800;margin-bottom:8px;text-decoration:underline;}
.svc-desc{font-size:.82rem;color:var(--grey-d);line-height:1.5;}
.svc-price{font-family:var(--ff);font-size:1.3rem;font-weight:700;color:var(--orange);margin-top:12px;}
/* UPLOAD ZONE */
.upload-zone{border:3px dashed var(--grey-m);border-radius:var(--r);padding:48px 32px;text-align:center;transition:all .3s;cursor:pointer;position:relative;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--lime);background:rgba(200,230,52,.04);}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-icon{font-size:3.5rem;margin-bottom:16px;}
.upload-title{font-family:var(--ff);font-size:1.4rem;font-weight:700;margin-bottom:8px;}
.upload-sub{font-size:.85rem;color:var(--grey-d);}
.scan-animation{display:none;position:relative;border-radius:var(--r);overflow:hidden;}
.scan-img{width:100%;max-height:200px;object-fit:cover;border-radius:var(--r);}
.scan-line{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--lime),transparent);animation:scan 2s linear 3;}
@keyframes scan{0%{top:0}100%{top:100%}}
/* VEHICLE INFO GRID */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.info-field{background:var(--grey-l);border-radius:var(--r-sm);padding:14px 16px;}
.info-label{font-family:var(--ff);font-size:.75rem;font-weight:700;color:var(--grey-d);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.info-value{font-family:var(--ff);font-size:1.1rem;font-weight:700;color:var(--black);}
/* MAKE GRID */
.make-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.make-card{border:2px solid var(--grey-m);border-radius:var(--r-sm);padding:16px 12px;text-align:center;cursor:pointer;transition:all .2s;background:#fff;}
.make-card:hover{border-color:var(--lime);background:rgba(200,230,52,.05);}
.make-card.selected{border-color:var(--lime);background:rgba(200,230,52,.1);}
.make-name{font-family:var(--ff);font-size:.95rem;font-weight:700;margin-top:8px;}
.make-emoji{font-size:1.8rem;}
/* BODY TYPE */
.body-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.body-card{border:2px solid var(--grey-m);border-radius:var(--r);padding:20px 14px;text-align:center;cursor:pointer;transition:all .2s;background:#fff;}
.body-card:hover{border-color:var(--orange);}
.body-card.selected{border-color:var(--orange);background:rgba(255,107,0,.06);}
.body-emoji{font-size:2.5rem;margin-bottom:10px;}
.body-name{font-family:var(--ff);font-size:1rem;font-weight:700;}
/* SERVICE CATALOG */
.catalog-layout{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start;}
.catalog-grid{display:grid;grid-template-columns:1fr;gap:14px;}
.service-card{border:2px solid var(--grey-m);border-radius:var(--r);padding:20px;background:#fff;transition:all .2s;cursor:pointer;}
.service-card:hover{border-color:var(--lime);box-shadow:var(--sh);}
.service-card.in-cart{border-color:var(--lime);background:rgba(200,230,52,.05);}
.sc-top{display:flex;align-items:flex-start;gap:16px;}
.sc-icon{font-size:2.2rem;flex-shrink:0;}
.sc-info{flex:1;}
.sc-name{font-family:var(--ff);font-size:1.2rem;font-weight:800;margin-bottom:6px;}
.sc-desc{font-size:.82rem;color:var(--grey-d);line-height:1.5;margin-bottom:12px;}
.sc-items{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.sc-item{background:var(--grey-l);border-radius:20px;padding:3px 10px;font-size:.75rem;color:var(--grey-d);}
.sc-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--grey-l);}
.sc-price{font-family:var(--ff);font-size:1.5rem;font-weight:900;color:var(--orange);}
/* CART */
.cart-box{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:24px;position:sticky;top:100px;}
.cart-title{font-family:var(--ff);font-size:1.3rem;font-weight:800;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.cart-count{background:var(--orange);color:#fff;font-size:.75rem;padding:2px 8px;border-radius:20px;}
.cart-empty{text-align:center;padding:32px 0;color:var(--grey-d);font-size:.88rem;}
.cart-items{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.cart-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--grey-l);border-radius:var(--r-sm);}
.ci-left{display:flex;align-items:center;gap:10px;}
.ci-icon{font-size:1.2rem;}
.ci-name{font-family:var(--ff);font-size:.9rem;font-weight:700;}
.ci-price{font-family:var(--ff);font-size:.95rem;font-weight:700;color:var(--orange);}
.ci-remove{background:none;border:none;color:var(--grey-d);cursor:pointer;font-size:1.1rem;padding:2px 6px;border-radius:4px;transition:all .2s;}
.ci-remove:hover{color:#e53935;background:rgba(229,57,53,.1);}
.cart-total{border-top:2px solid var(--grey-m);padding-top:14px;margin-top:4px;}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.ct-label{font-family:var(--ff);font-size:.9rem;color:var(--grey-d);}
.ct-val{font-family:var(--ff);font-size:1rem;font-weight:700;}
.ct-val.big{font-size:1.4rem;color:var(--orange);}
.disclaimer{background:rgba(255,107,0,.08);border:1px solid rgba(255,107,0,.25);border-radius:var(--r-sm);padding:12px 14px;font-size:.78rem;color:var(--orange);line-height:1.5;margin:12px 0;}
/* CALENDAR */
.calendar{background:#fff;border-radius:var(--r);padding:24px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.cal-month{font-family:var(--ff);font-size:1.4rem;font-weight:800;}
.cal-nav-btn{background:var(--grey-l);border:none;border-radius:var(--r-sm);width:34px;height:34px;cursor:pointer;font-size:1rem;transition:all .2s;}
.cal-nav-btn:hover{background:var(--lime);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-family:var(--ff);font-size:.78rem;font-weight:700;color:var(--grey-d);padding-bottom:8px;}
.cal-day{text-align:center;padding:10px 4px;border-radius:var(--r-sm);cursor:pointer;font-family:var(--ff);font-size:.95rem;font-weight:600;transition:all .2s;border:2px solid transparent;}
.cal-day.empty{cursor:default;}
.cal-day.past{color:var(--grey-m);cursor:not-allowed;}
.cal-day.available:hover{background:rgba(200,230,52,.2);border-color:var(--lime);}
.cal-day.selected{background:var(--lime);color:var(--black);}
.cal-day.full{color:var(--grey-d);text-decoration:line-through;cursor:not-allowed;}
.cal-day.today{border-color:var(--orange);}
/* TIME SLOTS */
.slots-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px;}
.slot-btn{border:2px solid var(--grey-m);border-radius:var(--r-sm);padding:14px;text-align:center;cursor:pointer;transition:all .2s;background:#fff;}
.slot-btn:hover{border-color:var(--lime);}
.slot-btn.selected{border-color:var(--lime);background:rgba(200,230,52,.1);}
.slot-btn.booked{border-color:var(--grey-m);background:var(--grey-l);cursor:not-allowed;opacity:.5;}
.slot-time{font-family:var(--ff);font-size:1.2rem;font-weight:800;}
.slot-status{font-size:.75rem;color:var(--grey-d);margin-top:2px;}
.slot-status.avail{color:#1a8a42;}
/* ORDER REVIEW */
.review-section{margin-bottom:20px;}
.review-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--grey-l);}
.review-label{font-size:.88rem;color:var(--grey-d);}
.review-value{font-family:var(--ff);font-weight:700;font-size:.95rem;}
.payment-split{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px;}
.pay-box{border-radius:var(--r);padding:20px;text-align:center;}
.pay-box.deposit{background:rgba(200,230,52,.1);border:2px solid var(--lime);}
.pay-box.balance{background:rgba(255,107,0,.08);border:2px solid rgba(255,107,0,.3);}
.pay-amount{font-family:var(--ff);font-size:2rem;font-weight:900;margin-bottom:4px;}
.pay-label{font-size:.78rem;color:var(--grey-d);}
.pay-due{font-size:.75rem;font-weight:600;margin-top:6px;}
/* PAYMENT FORM */
.payment-card{max-width:500px;margin:0 auto;}
.payment-secure{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:rgba(26,138,66,.08);border-radius:var(--r-sm);margin-bottom:24px;font-size:.82rem;color:#1a8a42;font-weight:600;}
.card-icons{display:flex;align-items:center;gap:8px;margin-bottom:20px;}
.card-icon{padding:4px 10px;border:1px solid var(--grey-m);border-radius:4px;font-family:var(--ff);font-size:.75rem;font-weight:700;color:var(--grey-d);}
.card-number-wrap{position:relative;}
.card-type-badge{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-family:var(--ff);font-size:.75rem;font-weight:700;color:var(--orange);}
/* CONFIRMATION */
.confirm-hero{background:linear-gradient(135deg,var(--black) 0%,#1a1a1a 100%);border-radius:var(--r);padding:40px;text-align:center;margin-bottom:24px;position:relative;overflow:hidden;}
.confirm-check{width:72px;height:72px;background:var(--lime);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 20px;animation:popIn .4s ease-out;}
@keyframes popIn{0%{transform:scale(0)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
.confirm-ref{font-family:var(--ff);font-size:.85rem;color:var(--grey-d);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.confirm-refnum{font-family:var(--ff);font-size:2rem;font-weight:900;color:var(--lime);}
/* PROGRESS TRACKER */
.timeline{display:flex;flex-direction:column;gap:0;}
.tl-item{display:flex;gap:20px;align-items:flex-start;padding:16px 0;}
.tl-left{display:flex;flex-direction:column;align-items:center;width:40px;flex-shrink:0;}
.tl-dot{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;border:3px solid var(--grey-m);}
.tl-dot.done{background:var(--lime);border-color:var(--lime);}
.tl-dot.active{background:var(--orange);border-color:var(--orange);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,0,.4)}50%{box-shadow:0 0 0 8px rgba(255,107,0,0)}}
.tl-dot.pending{background:var(--grey-l);border-color:var(--grey-m);}
.tl-line{width:2px;flex:1;min-height:30px;background:var(--grey-m);}
.tl-line.done{background:var(--lime);}
.tl-content{flex:1;padding-top:8px;}
.tl-title{font-family:var(--ff);font-size:1.1rem;font-weight:700;margin-bottom:4px;}
.tl-desc{font-size:.82rem;color:var(--grey-d);}
.tl-time{font-size:.75rem;color:var(--orange);font-weight:600;margin-top:4px;}
/* RATING */
.stars{display:flex;gap:8px;justify-content:center;margin:20px 0;}
.star{font-size:2.5rem;cursor:pointer;transition:transform .2s;filter:grayscale(1);}
.star.lit{filter:grayscale(0);}
.star:hover{transform:scale(1.2);}
/* NOTIFICATION */
.notif-bar{background:rgba(200,230,52,.12);border:1px solid rgba(200,230,52,.3);border-radius:var(--r-sm);padding:12px 16px;display:flex;align-items:center;gap:12px;font-size:.85rem;margin-bottom:16px;}
.notif-icon{font-size:1.2rem;}
/* ADMIN */
.admin-layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 60px);}
.admin-sidebar{background:var(--black);padding:24px 0;}
.admin-nav-item{padding:12px 24px;cursor:pointer;font-family:var(--ff);font-size:.95rem;font-weight:600;color:var(--grey-d);transition:all .2s;display:flex;align-items:center;gap:10px;border-left:3px solid transparent;}
.admin-nav-item:hover{color:#fff;border-left-color:var(--lime);}
.admin-nav-item.active{color:var(--lime);background:rgba(200,230,52,.08);border-left-color:var(--lime);}
.admin-main{background:var(--grey-l);padding:28px;}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
/* REPORT CHARTS */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.kpi-card{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--sh);border-top:4px solid var(--lime);}
.kpi-val{font-family:var(--ff);font-size:2rem;font-weight:900;color:var(--black);}
.kpi-lbl{font-size:.78rem;color:var(--grey-d);margin-top:4px;}
.kpi-trend{font-family:var(--ff);font-size:.82rem;font-weight:700;margin-top:8px;}
.kpi-trend.up{color:#1a8a42;}
.kpi-trend.dn{color:#e53935;}
.chart-wrap{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--sh);}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:160px;padding:0 8px;}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
.bar{border-radius:4px 4px 0 0;width:100%;min-height:4px;transition:height .5s ease;}
.bar-lbl{font-size:.68rem;color:var(--grey-d);font-family:var(--ff);}
.bar-val{font-size:.7rem;font-family:var(--ff);font-weight:700;color:var(--orange);}
/* TABLES */
.data-table{width:100%;border-collapse:collapse;font-size:.85rem;}
.data-table th{background:var(--black);color:#fff;font-family:var(--ff);font-weight:700;padding:10px 14px;text-align:left;letter-spacing:.3px;}
.data-table td{padding:10px 14px;border-bottom:1px solid var(--grey-l);}
.data-table tr:hover td{background:rgba(200,230,52,.05);}
.status-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-family:var(--ff);font-size:.75rem;font-weight:700;}
.status-confirmed{background:#e6f9ee;color:#1a8a42;}
.status-in-progress{background:rgba(255,107,0,.12);color:var(--orange);}
.status-completed{background:rgba(200,230,52,.2);color:#6a8300;}
.status-cancelled{background:#fde8e8;color:#e53935;}
/* PRICE EDITOR */
.price-table{width:100%;border-collapse:collapse;}
.price-table th{background:var(--black);color:#fff;font-family:var(--ff);font-weight:700;padding:10px 14px;text-align:left;}
.price-table td{padding:8px 14px;border-bottom:1px solid var(--grey-l);}
.price-input{width:100px;padding:6px 10px;border:2px solid var(--grey-m);border-radius:var(--r-sm);font-family:var(--ff);font-weight:700;font-size:.95rem;text-align:center;}
.price-input:focus{border-color:var(--lime);outline:none;}
/* VALET PACKAGES */
.valet-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.valet-card{border:2px solid var(--grey-m);border-radius:var(--r);padding:24px;background:#fff;transition:all .2s;cursor:pointer;position:relative;}
.valet-card:hover{border-color:var(--lime);transform:translateY(-3px);box-shadow:var(--sh2);}
.valet-card.in-cart{border-color:var(--lime);background:rgba(200,230,52,.06);}
.valet-card.featured{border-color:var(--orange);}
.valet-badge{position:absolute;top:-10px;right:16px;background:var(--orange);color:#fff;font-family:var(--ff);font-size:.75rem;font-weight:700;padding:3px 12px;border-radius:20px;letter-spacing:.5px;}
.valet-name{font-family:var(--ff);font-size:1.3rem;font-weight:900;margin-bottom:10px;}
.valet-price{font-family:var(--ff);font-size:1.8rem;font-weight:900;color:var(--orange);margin-bottom:14px;}
.valet-items{list-style:none;display:flex;flex-direction:column;gap:6px;}

.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--grey-m);margin-bottom:24px;}
.tab-btn{font-family:var(--ff);font-size:1rem;font-weight:700;padding:10px 22px;background:none;border:none;cursor:pointer;color:var(--grey-d);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;}
.tab-btn.active{color:var(--orange);border-bottom-color:var(--orange);}
.tab-btn:hover{color:var(--black);}
/* BOOKING MODE TABS */
.bm-tabs{display:grid;grid-template-columns:1fr 1fr;gap:0;border-radius:var(--r);overflow:hidden;border:2px solid var(--grey-m);margin-bottom:24px;}

.bm-tab-icon{font-size:1.8rem;flex-shrink:0;}
.bm-tab-title{font-family:var(--ff);font-size:1.05rem;font-weight:800;display:block;letter-spacing:.3px;}

.emg-banner-title{font-family:var(--ff);font-size:1.1rem;font-weight:800;color:#dc2626;margin-bottom:6px;display:flex;align-items:center;gap:8px;}

.emg-fee-amount{font-family:var(--ff);font-size:1.4rem;font-weight:900;color:#dc2626;}
.emg-checklist{list-style:none;display:flex;flex-direction:column;gap:6px;margin-top:10px;}
.emg-checklist li{font-size:.82rem;color:#7f1d1d;display:flex;align-items:flex-start;gap:8px;line-height:1.4;}
.emg-checklist li::before{content:'✓';color:#dc2626;font-weight:900;flex-shrink:0;}
/* ALERT */
.alert{border-radius:var(--r-sm);padding:14px 16px;margin-bottom:16px;font-size:.85rem;display:flex;align-items:flex-start;gap:10px;}
.alert-info{background:rgba(200,230,52,.1);border:1px solid rgba(200,230,52,.4);color:#5a7000;}
.alert-warn{background:rgba(255,107,0,.08);border:1px solid rgba(255,107,0,.3);color:var(--orange);}
.alert-success{background:#e6f9ee;border:1px solid #a8ddb8;color:#1a5c2a;}
/* FLOAT CART BTN */
.float-cart{position:fixed;bottom:24px;right:24px;background:var(--orange);color:#fff;border:none;border-radius:50px;padding:14px 22px;font-family:var(--ff);font-size:1rem;font-weight:700;cursor:pointer;box-shadow:var(--sh2);display:flex;align-items:center;gap:8px;z-index:50;transition:all .2s;}
.float-cart:hover{background:var(--orange-l);transform:translateY(-2px);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}

.modal-close{position:absolute;top:14px;right:14px;background:var(--grey-l);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:var(--grey-m);}
/* MISC */
.divider{border:none;border-top:2px solid var(--grey-l);margin:20px 0;}
.text-center{text-align:center;}
.text-grey{color:var(--grey-d);}
.mt-8{margin-top:8px;}
.mt-16{margin-top:16px;}
.mt-24{margin-top:24px;}
.mb-16{margin-bottom:16px;}
.mb-24{margin-bottom:24px;}
.flex{display:flex;}
.flex-center{display:flex;align-items:center;}
.flex-between{display:flex;align-items:center;justify-content:space-between;}
.gap-8{gap:8px;}
.gap-16{gap:16px;}
.fw-bold{font-weight:700;}
.font-ff{font-family:var(--ff);}
.color-orange{color:var(--orange);}
.color-lime{color:var(--lime);}
.hidden{display:none!important;}
@media(max-width:768px){
.hero-content{grid-template-columns:1fr;gap:32px;}
.hero-title{font-size:2.8rem;}
.svc-grid{grid-template-columns:1fr 1fr;}
.make-grid{grid-template-columns:repeat(3,1fr);}
.body-grid{grid-template-columns:repeat(2,1fr);}
.catalog-layout{grid-template-columns:1fr;}
.form-grid{grid-template-columns:1fr;}
.kpi-grid{grid-template-columns:1fr 1fr;}
.admin-layout{grid-template-columns:1fr;}
.valet-grid{grid-template-columns:1fr;}
.payment-split{grid-template-columns:1fr;}
}
/* ===== SCANNER STEP 1 ===== */
.scanner-layout{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;}
@media(max-width:720px){.scanner-layout{grid-template-columns:1fr;}}
.scanner-panel{background:var(--black);border-radius:var(--r);overflow:hidden;}
.scanner-panel-head{padding:13px 16px;background:rgba(200,230,52,.1);border-bottom:2px solid rgba(200,230,52,.2);display:flex;align-items:center;gap:8px;}
.scanner-panel-title{font-family:var(--ff);font-size:.95rem;font-weight:800;color:var(--lime);}
.scanner-panel-body{padding:14px;}
#cameraFeed{width:100%;border-radius:var(--r-sm);background:#111;max-height:200px;object-fit:cover;display:block;}
.scan-overlay-wrap{position:relative;border-radius:var(--r-sm);overflow:hidden;background:#111;min-height:120px;display:flex;align-items:center;justify-content:center;}
.scan-overlay-wrap video{border-radius:var(--r-sm);}
.scan-crosshair{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;}
.scan-sweep{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--lime),transparent);animation:sweep 1.8s linear infinite;display:none;}
.scan-sweep.active{display:block;}
@keyframes sweep{0%{top:0}100%{top:100%}}
.sc-btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--ff);font-size:.82rem;font-weight:700;padding:8px 14px;border-radius:var(--r-sm);border:none;cursor:pointer;transition:all .2s;letter-spacing:.3px;}
.sc-btn-lime{background:var(--lime);color:var(--black);}
.sc-btn-lime:hover{background:var(--lime-d);}
.sc-btn-orange{background:var(--orange);color:#fff;}
.sc-btn-orange:hover{background:var(--orange-l);}
.sc-btn-dark{background:#2a2a2a;color:#ccc;border:1px solid #444;}
.sc-btn-dark:hover{background:#383838;}
.sc-status{margin-top:10px;padding:8px 12px;border-radius:var(--r-sm);font-size:.8rem;font-weight:600;display:none;align-items:center;gap:6px;}
.sc-status.show{display:flex;}
.sc-scanning{background:rgba(200,230,52,.1);border:1px solid rgba(200,230,52,.3);color:var(--lime);}
.sc-success{background:#e6f9ee;border:1px solid #a8ddb8;color:#1a5c2a;}
.sc-error{background:#fde8e8;border:1px solid #f5aaaa;color:#b00020;}
.disc-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.disc-field{background:#1a1a1a;border-radius:var(--r-sm);padding:9px 11px;border-left:3px solid #444;transition:border-color .3s;}
.disc-field.filled{border-left-color:var(--lime);}

.disc-field-input{width:100%;border:none;background:transparent;font-family:var(--ff);font-size:.9rem;font-weight:700;color:#eee;padding:2px 0 0;outline:none;}

.parts-catalogue{background:var(--black);border-radius:var(--r);overflow:hidden;margin-top:14px;}

.parts-title{font-family:var(--ff);font-size:.9rem;font-weight:800;color:var(--orange);}

.part-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:#141414;border-radius:var(--r-sm);border:1px solid #252525;}
.part-name{font-size:.78rem;color:#ccc;}
.part-right{display:flex;align-items:center;gap:8px;}
.part-price{font-family:var(--ff);font-size:.85rem;font-weight:700;color:var(--lime);}
.part-tag{font-size:.68rem;padding:2px 6px;border-radius:10px;font-family:var(--ff);font-weight:700;}
.pt-oem{background:rgba(200,230,52,.15);color:#8ab300;}
.pt-compat{background:rgba(255,107,0,.15);color:var(--orange);}
.parts-empty{padding:20px;text-align:center;color:#555;font-size:.82rem;}
/* ===== DATETIME STEP 5 ===== */
.dt-layout{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;}
@media(max-width:640px){.dt-layout{grid-template-columns:1fr;}}
.dt-panel{background:var(--white);border:2px solid var(--grey-m);border-radius:var(--r);padding:20px;transition:border-color .3s;}
.dt-panel.dt-active{border-color:var(--lime);}
.dt-panel-title{font-family:var(--ff);font-size:1.1rem;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
input[type=date],input[type=time]{padding:13px 14px;border:2px solid var(--grey-m);border-radius:var(--r-sm);font-size:1rem;font-family:var(--ff);font-weight:600;background:#fff;transition:border .2s;width:100%;color:var(--black);cursor:pointer;}
input[type=date]:focus,input[type=time]:focus{outline:none;border-color:var(--lime);}
.quick-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.quick-btn{font-family:var(--ff);font-size:.78rem;font-weight:700;padding:5px 13px;border-radius:20px;border:2px solid var(--grey-m);background:#fff;cursor:pointer;transition:all .2s;color:var(--black);}
.quick-btn:hover{background:rgba(200,230,52,.15);border-color:var(--lime);}
.quick-btn.qb-active{background:var(--lime);border-color:var(--lime);color:var(--black);}
.slot-chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px;}

.slot-chip.chip-selected{border-color:var(--lime);background:rgba(200,230,52,.13);}
.slot-chip.chip-taken{border-color:var(--grey-m);background:var(--grey-l);cursor:not-allowed;opacity:.5;}
.slot-chip-time{font-family:var(--ff);font-size:1.05rem;font-weight:900;}
.slot-chip-stat{font-size:.68rem;margin-top:2px;}
.slot-chip-stat.ok{color:#1a8a42;}
.slot-chip-stat.no{color:#e53935;}
.dt-confirm{background:linear-gradient(135deg,rgba(200,230,52,.1),rgba(255,107,0,.07));border:2px solid var(--lime);border-radius:var(--r);padding:16px 20px;margin-top:20px;display:none;align-items:center;gap:14px;}
.dt-confirm.show{display:flex;}
.dt-confirm-icon{font-size:2rem;flex-shrink:0;}
.dt-confirm-date{font-family:var(--ff);font-size:1.15rem;font-weight:900;}
.dt-confirm-sub{font-size:.78rem;color:var(--grey-d);margin-top:3px;}
.dt-err{color:#e53935;font-size:.8rem;font-weight:600;margin-top:8px;display:none;}
.dt-err.show{display:block;}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--grey-l);}
::-webkit-scrollbar-thumb{background:var(--grey-m);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--grey-d);}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.media-box{background:#030617;border-radius:1.2rem;margin:.8rem 0;overflow:hidden;aspect-ratio:16/10;border:1px solid #334155;display:flex;align-items:center;justify-content:center;}
.media-box video,.media-box img,.media-box canvas{width:100%;height:100%;object-fit:contain;background:#000;}
.pill{background:#0f172f;border-radius:40px;padding:.25rem .9rem;font-size:.7rem;font-weight:500;border:1px solid #334155;display:inline-block;margin-right:8px;margin-top:8px;color:#b9c7dd;}
.pill.ok{background:#064e3b;border-color:#2dd4bf;color:#ccfbf1;}
.pill.bad{background:#7f1a1a;border-color:#f87171;color:#fee2e2;}
.pill.warn{background:#854d0e;border-color:#facc15;color:#fef9c3;}
/* ANIMATE */
.fade-in{animation:fadeIn .4s ease-out;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>

// ===================== STORAGE HELPERS =====================
function getBookings(){try{return JSON.parse(localStorage.getItem('mm_bookings')||'[]');}catch(e){return[];}}
function saveNewBooking(b){const arr=getBookings();arr.push(b);localStorage.setItem('mm_bookings',JSON.stringify(arr));}
function getServicePrices(){try{const p=JSON.parse(localStorage.getItem('mm_prices'));if(p)return p;}catch(e){}return DEFAULT_SERVICES.reduce((a,s)=>{a[s.id]=s.price;return a},{});}
function saveServicePrices(p){localStorage.setItem('mm_prices',JSON.stringify(p));}
function getValetPrices(){try{const p=JSON.parse(localStorage.getItem('mm_valet_prices'));if(p)return p;}catch(e){}return DEFAULT_VALET.reduce((a,v)=>{a[v.id]=v.price;return a},{});}
function saveValetPrices(p){localStorage.setItem('mm_valet_prices',JSON.stringify(p));}
function getServices(){const pp=getServicePrices();return DEFAULT_SERVICES.map(s=>({...s,price:pp[s.id]||s.price}));}
function getValets(){const pp=getValetPrices();return DEFAULT_VALET.map(v=>({...v,price:pp[v.id]||v.price}));}
function getSlotBookings(dateStr){return getBookings().filter(b=>b.date===dateStr&&b.status!=='cancelled').map(b=>b.time);}
function generateRef(){const n=String(Date.now()).slice(-6);return 'MM-'+new Date().getFullYear()+'-'+n;}
function formatPrice(p){return 'R'+Number(p).toLocaleString('en-ZA');}
function formatDate(d){if(!d)return'';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-ZA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});}
const CALLOUT_FEE=950; // R950 emergency / priority callout fee
function calloutFee(){return S.bookingMode==='emergency'?CALLOUT_FEE:0;}
function cartTotal(){return S.cart.reduce((a,i)=>a+i.price,0)+calloutFee();}
function cartDeposit(){return Math.round(cartTotal()*0.5);}

// ===================== RENDER =====================
function render(){
  const app=document.getElementById('app');
  if(S.adminView){app.innerHTML=renderAdmin();setupAdminEvents();return;}
  let html='';
  if(S.step===0)html=renderLanding();
  else if(S.step===1)html=renderLicense();
  else if(S.step===2)html=renderCustomer();
  else if(S.step===3)html=renderVehicle();
  else if(S.step===4)html=renderServices();
  else if(S.step===5)html=renderDateTime();
  else if(S.step===6)html=renderReview();
  else if(S.step===7)html=renderPayment();
  else if(S.step===8)html=renderConfirmation();
  else if(S.step===9)html=renderTracker();
  else if(S.step===10)html=renderRating();
  app.innerHTML=html;
  setupEvents();
  attachStep1Events();
  if(S.showModal)showModal();
}

function renderStepBar(){
  if(S.step===0||S.step>=8)return'';
  const steps=['Licence','Details','Vehicle','Services','Date & Time','Review','Payment'];
  let html='<div class="step-bar"><div class="step-track">';
  steps.forEach((s,i)=>{
    const num=i+1;
    const cls=S.step>num?'done':S.step===num?'active':'';
    html+=`<div class="step-dot ${cls}">${S.step>num?'✓':num}</div>`;
    if(i<steps.length-1)html+=`<div class="step-line ${S.step>num?'done':''}"></div>`;
  });
  html+='</div></div>';
  return html;
}

function renderAdminReports(){
  const bkgs=getBookings().filter(b=>b.status!=='cancelled');
  const tabs=['daily','weekly','monthly','annual'];
  const now=new Date();

  // Compute data
  let chartData=[];
  let labels=[];
  if(S.reportTab==='daily'){
    for(let i=6;i>=0;i--){
      const d=new Date(now);d.setDate(d.getDate()-i);
      const ds=d.toISOString().split('T')[0];
      const amt=bkgs.filter(b=>b.date===ds).reduce((a,b)=>a+b.total,0);
      labels.push(DAYS[d.getDay()]);chartData.push(amt);
    }
  } else if(S.reportTab==='weekly'){
    for(let i=3;i>=0;i--){
      const wStart=new Date(now);wStart.setDate(wStart.getDate()-i*7-6);
      const wEnd=new Date(now);wEnd.setDate(wEnd.getDate()-i*7);
      const amt=bkgs.filter(b=>{const bd=new Date(b.date);return bd>=wStart&&bd<=wEnd;}).reduce((a,b)=>a+b.total,0);
      labels.push(`Wk${4-i}`);chartData.push(amt);
    }
  } else if(S.reportTab==='monthly'){
    for(let i=5;i>=0;i--){
      const d=new Date(now.getFullYear(),now.getMonth()-i,1);
      const amt=bkgs.filter(b=>b.date.startsWith(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`)).reduce((a,b)=>a+b.total,0);
      labels.push(MONTHS[d.getMonth()].slice(0,3));chartData.push(amt);
    }
  } else {
    for(let i=3;i>=0;i--){
      const yr=now.getFullYear()-i;
      const amt=bkgs.filter(b=>b.date.startsWith(String(yr))).reduce((a,b)=>a+b.total,0);
      labels.push(String(yr));chartData.push(amt);
    }
  }

  const maxVal=Math.max(...chartData,1);
  const totalR=bkgs.reduce((a,b)=>a+b.total,0);
  const totalBookings=bkgs.length;
  const avgVal=totalBookings>0?Math.round(totalR/totalBookings):0;

  return`
  <div class="admin-header">
    <h2 style="font-size:1.8rem">Sales Reports</h2>
    <button class="btn btn-sm btn-outline" onclick="exportReport()">⬇ Export CSV</button>
  </div>
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-val">${formatPrice(totalR)}</div><div class="kpi-lbl">Total Revenue</div></div>
    <div class="kpi-card" style="border-top-color:var(--orange)"><div class="kpi-val">${totalBookings}</div><div class="kpi-lbl">Total Bookings</div></div>
    <div class="kpi-card" style="border-top-color:#1a8a42"><div class="kpi-val">${formatPrice(avgVal)}</div><div class="kpi-lbl">Avg Booking Value</div></div>
    <div class="kpi-card" style="border-top-color:var(--grey-d)"><div class="kpi-val">${formatPrice(Math.round(totalR*0.5))}</div><div class="kpi-lbl">Deposits Collected</div></div>
  </div>
  <div class="chart-wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h4 style="font-size:1rem">Revenue Chart</h4>
      <div class="tab-bar" style="border:none;margin:0">
        ${tabs.map(t=>`<button class="tab-btn ${S.reportTab===t?'active':''}" onclick="S.reportTab='${t}';renderAdmin2()" style="padding:6px 14px;font-size:.8rem">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}
      </div>
    </div>
    <div class="bar-chart">
      ${chartData.map((v,i)=>{
        const h=Math.max(Math.round((v/maxVal)*140),4);
        const colors=['var(--lime)','var(--orange)','var(--lime)','var(--orange)','var(--lime)','var(--orange)'];
        return`<div class="bar-col">
          <div class="bar-val">${v>0?formatPrice(v):''}</div>
          <div class="bar" style="height:${h}px;background:${colors[i%6]}"></div>
          <div class="bar-lbl">${labels[i]}</div>
        </div>`;
      }).join('')}
    </div>
  </div>
  <div class="card mt-16">
    <div class="card-body">
      <h4 style="font-size:1rem;margin-bottom:16px">Service Breakdown</h4>
      ${bkgs.length===0?`<div style="color:var(--grey-d);text-align:center;padding:24px">No completed bookings to report.</div>`:
      (() => {
        const svcCount={};
        bkgs.forEach(b=>b.services.forEach(s=>{svcCount[s.name]=(svcCount[s.name]||0)+1;}));
        const sorted=Object.entries(svcCount).sort((a,b)=>b[1]-a[1]);
        const total2=sorted.reduce((a,b)=>a+b[1],0);
        return`<div style="display:flex;flex-direction:column;gap:10px">
          ${sorted.map(([name,count])=>`
            <div>
              <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:.85rem">
                <span>${name}</span><span style="font-family:var(--ff);font-weight:700">${count} bookings (${Math.round(count/total2*100)}%)</span>
              </div>
              <div style="height:8px;background:var(--grey-l);border-radius:4px"><div style="height:8px;background:var(--orange);border-radius:4px;width:${Math.round(count/total2*100)}%"></div></div>
            </div>`).join('')}
        </div>`;
      })()}
    </div>
  </div>`;
}

function getZXingReader(){
  if(!S.zxingReader && window.ZXing){
    S.zxingReader = new window.ZXing.BrowserMultiFormatReader();
  }
  return S.zxingReader;
}

async function decodeCurrentImage(){
  if(!S.currentImageBitmap){ addAuditMsg('No image loaded — upload or capture first.',true); return; }
  const reader = getZXingReader();
  if(!reader){ addAuditMsg('ZXing library not loaded. Refresh page.',true); return; }
  addAuditMsg('Decoding with ZXing (PDF417 supported)...');
  try{
    const canvas = document.createElement('canvas');
    canvas.width  = S.currentImageBitmap.width;
    canvas.height = S.currentImageBitmap.height;
    canvas.getContext('2d').drawImage(S.currentImageBitmap, 0, 0);
    const imgEl = new Image();
    imgEl.src = canvas.toDataURL('image/png');
    await new Promise(resolve=>{ imgEl.onload = resolve; });
    const result = await reader.decodeFromImageElement(imgEl);
    if(result && result.getText()){
      const decodedText = result.getText();
      const ta = document.getElementById('barcodeRawText');
      if(ta) ta.value = decodedText;
      addAuditMsg(`✅ Decoded: ${result.getBarcodeFormat()} | ${decodedText.length} chars`);
      const pill = document.getElementById('scanStatusPill');
      if(pill){ pill.innerHTML = 'Scanner: decoded ✓'; pill.className = 'pill ok'; }
      if(decodedText.includes('%')){
        parseAndPopulateVehicle(decodedText);
      } else {
        addAuditMsg('Decoded but not SA licence format — paste into textarea and click Parse.',true);
      }
    } else {
      addAuditMsg('No barcode found — ensure PDF417 strip is visible and in focus.',true);
    }
  } catch(e){
    addAuditMsg(`Decode error: ${e.message}`,true);
  }
}

function parseAndPopulateVehicle(rawText){
  if(!rawText || !rawText.includes('%')){
    addAuditMsg('Invalid SA licence format — text must contain % separators.',true);
    return;
  }
  let parts = rawText.split('%');
  if(rawText.startsWith('%') && parts[0]==='') parts = parts.slice(1);
  while(parts.length < 14) parts.push('');

  const vehicleData = {
    plate:    parts[5]  || '',   // licence disc number
    register: parts[6]  || '',   // registration number
    body:     parts[7]  || '',   // body type
    make:     parts[8]  || '',   // vehicle make
    model:    parts[9]  || '',   // vehicle model
    colour:   parts[10] || '',   // colour
    vin:      parts[11] || '',   // VIN
    engine:   parts[12] || '',   // engine number
    expiry:   parts[13] || ''    // expiry date
  };

  // Write into global booking state
  S.vehicle = {
    make:    vehicleData.make,
    model:   vehicleData.model,
    reg:     vehicleData.register,
    vin:     vehicleData.vin,
    engine:  vehicleData.engine,
    license: vehicleData.plate,
    color:   vehicleData.colour,
    expiry:  vehicleData.expiry
  };

  // Populate editable form inputs
  const fMake  = document.getElementById('f-make');
  const fModel = document.getElementById('f-model');
  const fReg   = document.getElementById('f-reg');
  const fVin   = document.getElementById('f-vin');
  if(fMake)  fMake.value  = vehicleData.make;
  if(fModel) fModel.value = vehicleData.model;
  if(fReg)   fReg.value   = vehicleData.register;
  if(fVin)   fVin.value   = vehicleData.vin;

  // Populate display info-fields
  const dispReg     = document.getElementById('disp-reg');
  const dispVin     = document.getElementById('disp-vin');
  const dispEngine  = document.getElementById('disp-engine');
  const dispLicense = document.getElementById('disp-license');
  if(dispReg)     dispReg.innerText     = vehicleData.register || '—';
  if(dispVin)     dispVin.innerText     = vehicleData.vin      || '—';
  if(dispEngine)  dispEngine.innerText  = vehicleData.engine   || '—';
  if(dispLicense) dispLicense.innerText = vehicleData.plate    || '—';

  // Update parse status pill
  const parsePill = document.getElementById('parseStatusPill');
  if(parsePill){ parsePill.innerHTML = 'Parser: populated ✓'; parsePill.className = 'pill ok'; }

  addAuditMsg(`Parsed → ${vehicleData.make} ${vehicleData.model} | Reg: ${vehicleData.register} | VIN: ${vehicleData.vin} | Engine: ${vehicleData.engine}`);

  // Show the vehicle fields card
  const vf = document.getElementById('vehicleFields');
  const sa = document.getElementById('scanArea');
  if(vf) vf.classList.remove('hidden');
  if(sa) sa.classList.add('hidden');
}

function addAuditMsg(msg, isErr=false){
  const auditDiv = document.getElementById('auditLog');
  if(!auditDiv) return;
  const line = document.createElement('div');
  line.style.cssText = `color:${isErr?'#f87171':'#86efac'};padding:1px 0;border-bottom:1px solid rgba(255,255,255,.04);`;
  line.textContent = (isErr ? '⚠️ ' : '✓ ') + msg;
  auditDiv.insertBefore(line, auditDiv.firstChild);
  while(auditDiv.children.length > 8) auditDiv.lastChild.remove();
}

async function startCameraScanner(){
  if(S.activeStream) stopCameraScanner();
  const video       = document.getElementById('scannerVideo');
  const previewImg  = document.getElementById('previewImg');
  const placeholder = document.getElementById('placeholderMsg');
  if(video)       video.style.display       = 'block';
  if(previewImg)  previewImg.style.display  = 'none';
  if(placeholder) placeholder.style.display = 'none';
  try{
    const stream = await navigator.mediaDevices.getUserMedia({ video:{facingMode:'environment'}, audio:false });
    S.activeStream = stream;
    if(video) video.srcObject = stream;
    addAuditMsg('Camera active — point at the PDF417 barcode on the licence disk');
    const pill = document.getElementById('scanStatusPill');
    if(pill){ pill.innerHTML = 'Scanner: camera active'; pill.className = 'pill ok'; }
  } catch(err){
    addAuditMsg(`Camera access denied: ${err.message} — use Upload Image instead.`, true);
    const pill = document.getElementById('scanStatusPill');
    if(pill){ pill.innerHTML = 'Scanner: no camera'; pill.className = 'pill bad'; }
  }
}

function stopCameraScanner(){
  if(S.activeStream){ S.activeStream.getTracks().forEach(t=>t.stop()); S.activeStream = null; }
  const video = document.getElementById('scannerVideo');
  if(video){ video.srcObject = null; video.style.display = 'none'; }
  const placeholder = document.getElementById('placeholderMsg');
  if(placeholder) placeholder.style.display = 'flex';
  addAuditMsg('Camera stopped');
}

async function captureFrameScanner(){
  const video      = document.getElementById('scannerVideo');
  const canvas     = document.getElementById('hiddenCanvas');
  const previewImg = document.getElementById('previewImg');
  if(!S.activeStream || !video || !video.videoWidth){
    addAuditMsg('Start camera first, then click Capture Frame.',true);
    return;
  }
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
  previewImg.src = canvas.toDataURL('image/png');
  previewImg.style.display = 'block';
  video.style.display = 'none';
  S.currentImageBitmap = await createImageBitmap(canvas);
  addAuditMsg(`Frame captured (${canvas.width}×${canvas.height}px) — click Decode Barcode`);
}

function handleImageUpload(file){
  if(!file) return;
  stopCameraScanner();
  const url = URL.createObjectURL(file);
  const previewImg  = document.getElementById('previewImg');
  const placeholder = document.getElementById('placeholderMsg');
  const video       = document.getElementById('scannerVideo');
  if(previewImg)  { previewImg.src = url; previewImg.style.display = 'block'; }
  if(placeholder)   placeholder.style.display = 'none';
  if(video)         video.style.display = 'none';
  const img = new Image();
  img.src = url;
  img.onload = async ()=>{
    S.currentImageBitmap = await createImageBitmap(img);
    addAuditMsg(`Image loaded: ${file.name} (${img.width}×${img.height}px) — click Decode Barcode`);
    URL.revokeObjectURL(url);
  };
}

function formatCardNum(input){
  let v=input.value.replace(/\D/g,'').slice(0,16);
  input.value=v.replace(/(.{4})/g,'$1 ').trim();
  const badge=document.getElementById('cardTypeBadge');
  if(badge){
    if(v.startsWith('4'))badge.textContent='VISA';
    else if(/^5[1-5]/.test(v))badge.textContent='MC';
    else if(/^3[47]/.test(v))badge.textContent='AMEX';
    else badge.textContent='CARD';
  }
}
function formatCardExpiry(input){
  let v=input.value.replace(/\D/g,'').slice(0,4);
  if(v.length>=2)v=v.slice(0,2)+'/'+v.slice(2);
  input.value=v;
}

  const ex=(document.getElementById('f-card-expiry')?.value||'').trim();
  const cv=(document.getElementById('f-cvv')?.value||'').trim();

  let valid=true;
  showFieldErr('errCardholder',!ch);if(!ch)valid=false;
  showFieldErr('errCardnum',cn.length<16);if(cn.length<16)valid=false;
  showFieldErr('errExpiry',ex.length<5);if(ex.length<5)valid=false;
  showFieldErr('errCvv',cv.length<3);if(cv.length<3)valid=false;

  if(!valid){showToast('⚠️ Please fill in all card details correctly.');return;}

  // Validate expiry not in the past
  const [mm,yy]=ex.split('/');
  const expDate=new Date(2000+parseInt(yy),parseInt(mm)-1,1);
  if(expDate<new Date()){showFieldErr('errExpiry',true);showToast('⚠️ Your card has expired.');return;}

  // Switch to processing state
  const form=document.getElementById('payFormWrap');
  const proc=document.getElementById('payProcessing');
  if(form)form.style.display='none';
  if(proc)proc.style.display='block';

  setTimeout(()=>{
    S.bookingRef=generateRef();
    const booking={
      id:S.bookingRef,
      date:S.selectedDate,
      time:S.selectedTime,
      customer:{...S.customer},
      vehicle:{...S.vehicle,bodyType:S.bodyType},
      address:S.address,
      services:[...S.cart],
      total:cartTotal(),
      deposit:cartDeposit(),
      balance:cartTotal()-cartDeposit(),
      status:'confirmed',
      createdAt:new Date().toISOString()
    };
    saveNewBooking(booking);
    goStep(8);
  },2200);
}

function checkAdminPw(){
  const pw=document.getElementById('f-adminpw')?.value;
  if(pw==='admin123'){S.adminLoggedIn=true;S.adminPwError=false;S.adminTab='dashboard';render();}
  else{S.adminPwError=true;render();}
}

function saveServicePrice(id){
  const val=parseInt(document.getElementById('price-'+id)?.value);
  if(isNaN(val)||val<0){alert('Invalid price');return;}
  const pp=getServicePrices();pp[id]=val;saveServicePrices(pp);
  showToast('Price updated successfully!');
}

function saveValetPrice(id){
  const val=parseInt(document.getElementById('valet-'+id)?.value);
  if(isNaN(val)||val<0){alert('Invalid price');return;}
  const vp=getValetPrices();vp[id]=val;saveValetPrices(vp);
  showToast('Valet price updated!');
}

function updateBookingStatus(id,status){
  const arr=getBookings();
  const idx=arr.findIndex(b=>b.id===id);
  if(idx>=0){arr[idx].status=status;localStorage.setItem('mm_bookings',JSON.stringify(arr));}
  showToast('Status updated!');
}

function exportReport(){
  const bkgs=getBookings();
  const headers=['Ref','Date','Time','Customer','Phone','Email','Vehicle','Body Type','Services','Total','Deposit','Balance','Status'];
  const rows=bkgs.map(b=>[b.id,b.date,b.time,b.customer.name,b.customer.phone,b.customer.email,`${b.vehicle.make} ${b.vehicle.model}`,b.vehicle.bodyType||'',b.services.map(s=>s.name).join('; '),b.total,b.deposit,b.balance,b.status||'confirmed']);
  let csv=headers.join(',')+'\n'+rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`auto-haus-torque-report-${new Date().toISOString().split('T')[0]}.csv`;a.click();
  URL.revokeObjectURL(url);
}

function submitRating(){
  const comment=document.getElementById('f-comment')?.value;
  // Save rating to booking
  const arr=getBookings();
  const last=arr.find(b=>b.id===S.bookingRef);
  if(last){last.rating=S.rating;last.comment=comment;last.status='completed';localStorage.setItem('mm_bookings',JSON.stringify(arr));}
  alert(`Thank you for your ${S.rating}-star rating! We appreciate your feedback.`);
  goHome();
}

function showToast(msg){
  const el=document.createElement('div');
  el.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--black);color:#fff;font-family:var(--ff);font-size:.95rem;font-weight:700;padding:12px 24px;border-radius:30px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:fadeIn .3s ease-out';
  el.textContent='✓ '+msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

render();
