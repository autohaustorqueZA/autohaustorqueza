<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Invitation ❤️</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    text-align:center;
    padding:50px;
}

.container{
    background:white;
    max-width:600px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button{
    padding:15px 30px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

label{
    display:block;
    margin-top:20px;
    font-weight:bold;
}

select, input{
    width:80%;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

#result{
    margin-top:30px;
    font-size:20px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>


<style>
.floating{
    position: fixed;
    top: -50px;
    font-size: 30px;
    animation: fall linear infinite;
    z-index: -1;
}

@keyframes fall{
    from{
        transform: translateY(-50px);
    }
    to{
        transform: translateY(110vh);
    }
}
</style>

</head>
<body>

<div class="container">

<div id="questionPage">
<h1>❤️ Will You Go On A Date With Me? ❤️</h1>

<button onclick="showDateOptions()">Yes ❤️</button>

<button id="noButton" onmouseover="moveNoButton()">
No 😢
</button>
</div>

<div id="datePage" style="display:none;">

<h1>❤️ Yay! Let's Plan Our Date ❤️</h1>

<label>What would you like us to do?</label>
<select id="activity">
<option>🍽️ Dinner at a Restaurant</option>
<option>🍹 Club for Drinks</option>
</select>

<label>What type of food would you like?</label>
<select id="food">
<option>🥩 Steak</option>
<option>🍝 Italian</option>
<option>🍣 Sushi</option>
<option>🍕 Pizza</option>
<option>🍔 Burgers</option>
<option>🦐 Seafood</option>
</select>

<label>Choose a date:</label>
<input type="date" id="date">

<label>Choose a time:</label>
<input type="time" id="time">

<button onclick="submitDate()">Confirm Our Date ❤️</button>

<div id="result"></div>

</div>

</div>

<script>
function showDateOptions(){

    confetti({
        particleCount: 180,
        spread: 100,
        origin: { y: 0.6 }
    });

    document.getElementById("questionPage").style.display = "none";
    document.getElementById("datePage").style.display = "block";
}

function moveNoButton(){
    let button = document.getElementById("noButton");

    button.style.position = "absolute";
    button.style.left = Math.random()*300 + "px";
    button.style.top = Math.random()*300 + "px";
}

function submitDate(){

    let activity = document.getElementById("activity").value;
    let food = document.getElementById("food").value;
    let date = document.getElementById("date").value;
    let time = document.getElementById("time").value;

    document.getElementById("result").innerHTML =
    `❤️ I can't wait to spend this special time with you!<br><br>
    <b>Plan:</b> ${activity}<br>
    <b>Food:</b> ${food}<br>
    <b>Date:</b> ${date}<br>
    <b>Time:</b> ${time}`;
}
</script>


<script>
function createFloatingEmoji(){

    const emojis = ["🌹","❤️"];

    setInterval(() => {

        const emoji = document.createElement("div");
        emoji.className = "floating";
        emoji.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

        emoji.style.left = Math.random()*100 + "vw";
        emoji.style.animationDuration = (4 + Math.random()*4) + "s";

        document.body.appendChild(emoji);

        setTimeout(() => {
            emoji.remove();
        },8000);

    },500);

}

createFloatingEmoji();
</script>

</body>
</html>
